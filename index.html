<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid-Adha Mubarak | Mickoz</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/skulpt-stdlib.js"></script>
    
    <style>
        body {
            background-color: #030114; 
            color: #ffd700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #mycanvas {
            margin-top: 10px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
            background-color: #030114;
            max-width: 100%; 
            overflow: hidden;
        }
        .play-btn {
            background: linear-gradient(45deg, #ff0055, #ffd700);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s;
            margin-bottom: 20px;
            z-index: 10;
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        #ui-container {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <button class="play-btn" id="startBtn" onclick="runAnimation()">▶ تشغيل العرض والأغنية</button>
    </div>
    
    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="mycanvas"></div>

    <textarea id="pythonCode" style="display:none;">
import turtle
import math
import random

screen = turtle.Screen()
screen.bgcolor("#030114") 
screen.setup(width=850, height=850)

bg_t = turtle.Turtle()
bg_t.hideturtle()
bg_t.speed(0)
bg_t.penup()

for _ in range(100):
    bg_t.goto(random.randint(-400, 400), random.randint(-150, 400))
    bg_t.color(random.choice(["#ffffff", "#fff5e6", "#ffd700"]))
    bg_t.dot(random.uniform(1, 2.5))

def draw_decorations():
    bg_t.pensize(2)
    bg_t.color("#ffffff")
    
    bg_t.goto(-425, 400)
    bg_t.pendown()
    bg_t.goto(-100, 320)
    bg_t.penup()
    bg_t.goto(425, 400)
    bg_t.pendown()
    bg_t.goto(100, 320)
    bg_t.penup()
    
    flag_colors = ["#ff0055", "#00ffcc", "#ffd700", "#ff00ff", "#00ff00"]
    
    for i in range(7):
        x = -400 + (i * 45)
        y = 400 - (i * 11)
        bg_t.goto(x, y)
        bg_t.color(flag_colors[i % len(flag_colors)])
        bg_t.begin_fill()
        bg_t.goto(x + 30, y - 8)
        bg_t.goto(x + 15, y - 40)
        bg_t.goto(x, y)
        bg_t.end_fill()

    for i in range(7):
        x = 400 - (i * 45)
        y = 400 - (i * 11)
        bg_t.goto(x, y)
        bg_t.color(flag_colors[i % len(flag_colors)])
        bg_t.begin_fill()
        bg_t.goto(x - 30, y - 8)
        bg_t.goto(x - 15, y - 40)
        bg_t.goto(x, y)
        bg_t.end_fill()

draw_decorations()

sheep_t = turtle.Turtle()
sheep_t.hideturtle()
sheep_t.speed(0)

def draw_complete_sheep(cx, cy, s):
    t = sheep_t
    t.penup()
    t.setheading(0)
    t.pensize(1)

    for x in [-45, -15, 15, 45]:
        t.goto(cx + x*s, cy - 75*s)
        t.color("#3a3a3a")
        t.begin_fill()
        t.setheading(0)

        for _ in range(2):
            t.forward(16*s)
            t.right(90)
            t.forward(65*s)
            t.right(90)
        t.end_fill()

        t.goto(cx + x*s - 2*s, cy - 140*s)
        t.color("#111111")
        t.begin_fill()

        for _ in range(2):
            t.forward(20*s)
            t.right(90)
            t.forward(10*s)
            t.right(90)
        t.end_fill()

    wool = [
        (-70, -15, 42), (-50, 20, 45), (-15, 38, 48), (25, 35, 48),
        (60, 15, 43), (75, -20, 40), (50, -50, 42), (10, -62, 45),
        (-35, -55, 45), (-75, -40, 40)
    ]

    t.color("#ffffff")
    for x, y, r in wool:
        t.goto(cx + x*s, cy + y*s)
        t.begin_fill()
        t.circle(r*s)
        t.end_fill()

    hx = cx + 95*s
    hy = cy - 8*s

    t.goto(hx, hy)
    t.color("#ffd08a")
    t.begin_fill()
    t.circle(42*s)
    t.end_fill()

    for ex in [-38, 38]:
        t.goto(hx + ex*s, hy + 38*s)
        t.color("#ffd08a")
        t.begin_fill()
        t.circle(16*s)
        t.end_fill()

        t.goto(hx + ex*s, hy + 40*s)
        t.color("#ff9fbc")
        t.begin_fill()
        t.circle(10*s)
        t.end_fill()

    head_wool = [(-26, 58, 16), (-8, 70, 18), (12, 70, 18), (30, 58, 16)]
    t.color("#ffffff")
    for x, y, r in head_wool:
        t.goto(hx + x*s, hy + y*s)
        t.begin_fill()
        t.circle(r*s)
        t.end_fill()

    for ex in [-14, 14]:
        t.goto(hx + ex*s, hy + 50*s)
        t.color("white")
        t.dot(16*s)
        t.goto(hx + ex*s, hy + 50*s)
        t.color("black")
        t.dot(7*s)
        t.goto(hx + ex*s + 2*s, hy + 53*s)
        t.color("white")
        t.dot(3*s)

    for ex in [-27, 27]:
        t.goto(hx + ex*s, hy + 30*s)
        t.color("#ff9fbc")
        t.dot(16*s)

    t.goto(hx, hy + 28*s)
    t.color("#111111")
    t.begin_fill()
    t.setheading(0)
    t.circle(7*s)
    t.end_fill()

    t.goto(hx, hy + 22*s)
    t.color("#111111")
    t.setheading(-90)
    t.pendown()
    t.pensize(2)
    t.forward(14*s)
    t.penup()

    t.goto(hx - 16*s, hy + 14*s)
    t.setheading(-60)
    t.pendown()
    t.circle(16*s, 120)
    t.penup()
    
    t.pensize(1)
    t.setheading(0)

draw_complete_sheep(-40, -140, 1.1)

text_t = turtle.Turtle()
text_t.hideturtle()
text_t.speed(0)
text_t.penup()

def draw_final_fixed_text():
    for pos, txt, size in [((0, 110), "Eid-Adha", 45), ((0, 30), "Mubarak", 50)]:
        text_t.goto(pos[0]+3, pos[1]-3)
        text_t.color("#000000")
        text_t.write(txt, align="center", font=("Arial", size, "bold"))
        text_t.goto(pos)
        text_t.color("#ffd700") 
        text_t.write(txt, align="center", font=("Arial", size, "bold"))

draw_final_fixed_text()

sparkle_t = turtle.Turtle()
sparkle_t.hideturtle()
sparkle_t.speed(0)

# تم تغيير الحلقة اللانهائية بحلقة محددة لمنع تجميد المتصفح
for _ in range(30):
    sx = random.randint(-280, 280)
    sy = random.randint(140, 260)
    sparkle_t.penup()
    sparkle_t.goto(sx, sy)
    sparkle_t.color(random.choice(["#ffffff", "#ffd700", "#00ffcc"]))
    for _ in range(4):
        sparkle_t.pendown()
        sparkle_t.forward(10)
        sparkle_t.backward(10)
        sparkle_t.right(90)
    </textarea>

    <script>
        function builtinRead(x) {
            if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
                throw "File not found: '" + x + "'";
            return Sk.builtinFiles["files"][x];
        }

        function runAnimation() {
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('bgMusic').play();

            var prog = document.getElementById("pythonCode").value;
            Sk.pre = "output";
            Sk.configure({
                output: function(text) { console.log(text); },
                read: builtinRead,
                __future__: Sk.python3
            });
            
            (Sk.TurtleGraphics || (Sk.TurtleGraphics = {})).target = 'mycanvas';
            
            var myPromise = Sk.misceval.asyncToPromise(function() {
                return Sk.importMainWithBody("<stdin>", false, prog, true);
            });
            
            myPromise.then(function(mod) {
                console.log('Execution Complete.');
            }, function(err) {
                console.error(err.toString());
                alert("حدث خطأ في الكود: " + err.toString());
            });
        }
    </script>
</body>
</html>
