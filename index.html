<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid-Adha Mubarak | Mickoz</title>
    <style>
        body {
            background-color: #030114;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            width: 95%;
            height: auto;
            background-color: #030114;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
            display: none; /* مخفي حتى يتم الضغط على تشغيل */
        }
        .play-btn {
            background: linear-gradient(45deg, #ff0055, #ffd700);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s;
            position: absolute;
            z-index: 10;
        }
        .play-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="canvas-container">
        <button class="play-btn" id="startBtn">▶ تشغيل العرض</button>
        <canvas id="eidCanvas" width="850" height="850"></canvas>
    </div>

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('eidCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('startBtn');
        const audio = document.getElementById('bgMusic');

        // بمجرد الضغط، يختفي الزر، وتظهر الرسمة، وتعمل الموسيقى
        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            canvas.style.display = 'block';
            audio.volume = 1.0;
            audio.play().catch(e => console.log("Audio play blocked by browser"));
            drawScene();
        });

        // دالة تحويل منطق Turtle إلى JavaScript Canvas
        function drawScene() {
            // رسم الخلفية
            ctx.fillStyle = '#030114';
            ctx.fillRect(0, 0, 850, 850);

            // تعديل نقطة الصفر لتكون في المنتصف مثل Turtle
            ctx.save();
            ctx.translate(425, 425);
            
            // دالة مساعدة لرسم الدوائر
            function drawCircle(x, y, r, color) {
                ctx.beginPath();
                ctx.arc(x, -y, r, 0, Math.PI * 2); // -y لأن اتجاه الـ y معكوس في الويب
                ctx.fillStyle = color;
                ctx.fill();
            }

            // 1. رسم النجوم في الخلفية
            const starColors = ["#ffffff", "#fff5e6", "#ffd700"];
            for (let i = 0; i < 150; i++) {
                let x = (Math.random() - 0.5) * 800; 
                let y = (Math.random() - 0.5) * 550 + 125; 
                let r = Math.random() * 1.25 + 0.5; 
                drawCircle(x, y, r, starColors[Math.floor(Math.random() * starColors.length)]);
            }

            // 2. رسم خيوط الزينة
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-425, -400);
            ctx.lineTo(-100, -320);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(425, -400);
            ctx.lineTo(100, -320);
            ctx.stroke();

            // 3. رسم الأعلام
            const flagColors = ["#ff0055", "#00ffcc", "#ffd700", "#ff00ff", "#00ff00"];
            for (let i = 0; i < 7; i++) {
                // الأعلام اليسرى
                let x = -400 + (i * 45);
                let y = 400 - (i * 11);
                ctx.fillStyle = flagColors[i % flagColors.length];
                ctx.beginPath();
                ctx.moveTo(x, -y);
                ctx.lineTo(x + 30, -(y - 8));
                ctx.lineTo(x + 15, -(y - 40));
                ctx.fill();

                // الأعلام اليمنى
                x = 400 - (i * 45);
                y = 400 - (i * 11);
                ctx.fillStyle = flagColors[i % flagColors.length];
                ctx.beginPath();
                ctx.moveTo(x, -y);
                ctx.lineTo(x - 30, -(y - 8));
                ctx.lineTo(x - 15, -(y - 40));
                ctx.fill();
            }

            // 4. رسم الخروف
            let cx = -40, cy = -140, s = 1.1;

            // أقدام الخروف
            const legOffsets = [-45, -15, 15, 45];
            for (let x of legOffsets) {
                ctx.fillStyle = "#3a3a3a";
                ctx.fillRect(cx + x*s, -(cy - 75*s), 16*s, 65*s); 
                
                ctx.fillStyle = "#111111";
                ctx.fillRect(cx + x*s - 2*s, -(cy - 140*s), 20*s, 10*s);
            }

            // صوف الجسم
            const wool = [
                [-70, -15, 42], [-50, 20, 45], [-15, 38, 48], [25, 35, 48],
                [60, 15, 43], [75, -20, 40], [50, -50, 42], [10, -62, 45],
                [-35, -55, 45], [-75, -40, 40]
            ];
            for (let w of wool) drawCircle(cx + w[0]*s, cy + w[1]*s, w[2]*s, "#ffffff");

            // الرأس
            let hx = cx + 95*s;
            let hy = cy - 8*s;
            drawCircle(hx, hy, 42*s, "#ffd08a");

            // الأذنين
            for (let ex of [-38, 38]) {
                drawCircle(hx + ex*s, hy + 38*s, 16*s, "#ffd08a");
                drawCircle(hx + ex*s, hy + 40*s, 10*s, "#ff9fbc");
            }

            // صوف الرأس
            const headWool = [[-26, 58, 16], [-8, 70, 18], [12, 70, 18], [30, 58, 16]];
            for (let hw of headWool) drawCircle(hx + hw[0]*s, hy + hw[1]*s, hw[2]*s, "#ffffff");

            // العيون
            for (let ex of [-14, 14]) {
                drawCircle(hx + ex*s, hy + 50*s, 8*s, "white");
                drawCircle(hx + ex*s, hy + 50*s, 3.5*s, "black");
                drawCircle(hx + ex*s + 2*s, hy + 53*s, 1.5*s, "white");
            }

            // الخدود
            for (let ex of [-27, 27]) drawCircle(hx + ex*s, hy + 30*s, 8*s, "#ff9fbc");

            // الأنف
            drawCircle(hx, hy + 28*s, 7*s, "#111111");

            // الفم
            ctx.strokeStyle = "#111111";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(hx, -(hy + 22*s));
            ctx.lineTo(hx, -(hy + 8*s));
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(hx, -(hy + 14*s), 12*s, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.stroke();

            ctx.restore(); 

            // 5. رسم النصوص
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            const texts = [
                {y: 425 - 110, txt: "Eid-Adha", size: 45},
                {y: 425 - 30, txt: "Mubarak", size: 50}
            ];

            for (let t of texts) {
                ctx.font = `bold ${t.size}px Arial`;
                ctx.fillStyle = "#000000";
                ctx.fillText(t.txt, 425 + 3, t.y + 3); 
                ctx.fillStyle = "#ffd700";
                ctx.fillText(t.txt, 425, t.y);
            }
        }
    </script>
</body>
</html>
